version: '3.8'

# Stack Kafka KRaft sécurisée (SASL/SCRAM-SHA-256) — séparée de la stack L1.
# Réseau isolé : kafka-sec-net. Ports externes : 19092 / 19093 / 19094.
# Bootstrap user : admin / admin-secret (super-user, créé via kafka-storage --add-scram).

networks:
  kafka-sec-net:
    driver: bridge

volumes:
  kafka-sec-1-data:
  kafka-sec-2-data:
  kafka-sec-3-data:

x-kafka-common-env: &kafka-common-env
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-sec-1:29093,2@kafka-sec-2:29093,3@kafka-sec-3:29093
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

  # SASL — mécanismes (uniquement pour le listener EXTERNAL)
  KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
  KAFKA_LISTENER_NAME_EXTERNAL_SCRAM_SHA_256_SASL_JAAS_CONFIG: |
    org.apache.kafka.common.security.scram.ScramLoginModule required username="admin" password="admin-secret";

  # Authorization (KRaft : StandardAuthorizer, ACLs dans le metadata log)
  KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
  KAFKA_SUPER_USERS: User:admin;User:ANONYMOUS
  KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
  KAFKA_EARLY_START_LISTENERS: CONTROLLER

  # Replication / résilience
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_DEFAULT_REPLICATION_FACTOR: 3
  KAFKA_MIN_INSYNC_REPLICAS: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  KAFKA_LOG_DIRS: /var/lib/kafka/data
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  # Cluster ID : 22 chars base64 sans padding = exactement 16 octets UUID v4.
  # Pour regenerer : docker run --rm confluentinc/cp-kafka:7.6.0 kafka-storage random-uuid
  CLUSTER_ID: "8ladZhurSXOrmVuvlDXwRw"

services:
  kafka-sec-1:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-sec-1
    container_name: kafka-sec-1
    ports:
      - "19092:19092"
      - "17071:7071"
    environment:
      <<: *kafka-common-env
      KAFKA_OPTS: "-javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=7071:/opt/jmx/kafka-jmx-exporter.yml -Djava.security.auth.login.config=/etc/kafka/broker_jaas.conf"
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-sec-1:29092,EXTERNAL://localhost:19092
    volumes:
      - kafka-sec-1-data:/var/lib/kafka/data
      - ../../docker/jmx:/opt/jmx:ro
      - ./users/admin.properties:/etc/kafka/admin.properties:ro
      - ./users/broker_jaas.conf:/etc/kafka/broker_jaas.conf:ro
    networks:
      - kafka-sec-net
    # Pré-format du metadata log avec un user admin SCRAM pré-créé,
    # puis lancement normal du broker.
    # Sequence:
    #  1. /etc/confluent/docker/configure  -> generate /etc/kafka/kafka.properties from env vars
    #  2. kafka-storage format             -> initialize KRaft metadata + admin SCRAM user (idempotent)
    #  3. /etc/confluent/docker/launch     -> start the broker reusing the already-generated config
    command: >
      bash -c '
      /etc/confluent/docker/configure;
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        kafka-storage format -t "$$CLUSTER_ID" \
          -c /etc/kafka/kafka.properties \
          --add-scram "SCRAM-SHA-256=[name=admin,password=admin-secret]" \
          --ignore-formatted;
      fi;
      /etc/confluent/docker/launch'

  kafka-sec-2:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-sec-2
    container_name: kafka-sec-2
    ports:
      - "19093:19093"
      - "17072:7071"
    environment:
      <<: *kafka-common-env
      KAFKA_OPTS: "-javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=7071:/opt/jmx/kafka-jmx-exporter.yml -Djava.security.auth.login.config=/etc/kafka/broker_jaas.conf"
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:19093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-sec-2:29092,EXTERNAL://localhost:19093
    volumes:
      - kafka-sec-2-data:/var/lib/kafka/data
      - ../../docker/jmx:/opt/jmx:ro
      - ./users/admin.properties:/etc/kafka/admin.properties:ro
      - ./users/broker_jaas.conf:/etc/kafka/broker_jaas.conf:ro
    networks:
      - kafka-sec-net
    # Sequence:
    #  1. /etc/confluent/docker/configure  -> generate /etc/kafka/kafka.properties from env vars
    #  2. kafka-storage format             -> initialize KRaft metadata + admin SCRAM user (idempotent)
    #  3. /etc/confluent/docker/launch     -> start the broker reusing the already-generated config
    command: >
      bash -c '
      /etc/confluent/docker/configure;
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        kafka-storage format -t "$$CLUSTER_ID" \
          -c /etc/kafka/kafka.properties \
          --add-scram "SCRAM-SHA-256=[name=admin,password=admin-secret]" \
          --ignore-formatted;
      fi;
      /etc/confluent/docker/launch'

  kafka-sec-3:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-sec-3
    container_name: kafka-sec-3
    ports:
      - "19094:19094"
      - "17073:7071"
    environment:
      <<: *kafka-common-env
      KAFKA_OPTS: "-javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=7071:/opt/jmx/kafka-jmx-exporter.yml -Djava.security.auth.login.config=/etc/kafka/broker_jaas.conf"
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:19094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-sec-3:29092,EXTERNAL://localhost:19094
    volumes:
      - kafka-sec-3-data:/var/lib/kafka/data
      - ../../docker/jmx:/opt/jmx:ro
      - ./users/admin.properties:/etc/kafka/admin.properties:ro
      - ./users/broker_jaas.conf:/etc/kafka/broker_jaas.conf:ro
    networks:
      - kafka-sec-net
    # Sequence:
    #  1. /etc/confluent/docker/configure  -> generate /etc/kafka/kafka.properties from env vars
    #  2. kafka-storage format             -> initialize KRaft metadata + admin SCRAM user (idempotent)
    #  3. /etc/confluent/docker/launch     -> start the broker reusing the already-generated config
    command: >
      bash -c '
      /etc/confluent/docker/configure;
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        kafka-storage format -t "$$CLUSTER_ID" \
          -c /etc/kafka/kafka.properties \
          --add-scram "SCRAM-SHA-256=[name=admin,password=admin-secret]" \
          --ignore-formatted;
      fi;
      /etc/confluent/docker/launch'
